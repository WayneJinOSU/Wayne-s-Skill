interface:
  display_name: "Agentic 底盘型成长股研究"
  short_description: "用私有模块、多角色研究、高召回搜索、行业经济性、TAM/SAM/SOM、证据边界和反方审查完成底盘型成长股报告"
  default_prompt: "Use $chassis-growth-agentic-research for a formal A-share chassis growth stock report. Apply the private-module framework: market repricing spine, base business floor, second growth curve, industry economics and TAM/SAM/SOM, platform reuse, competition/customer validation, execution signals, profit bridge, tracking dashboard, evidence boundaries, midterm structure QA, and valuation handoff inputs. Formal research must trigger role-separated work for market repricing, base business, second curve, industry space/share, platform reuse, competition/customer validation, execution validation, profit bridge, tracking dashboard, evidence boundary calibration, midterm structure QA, and skeptic review. Use high-recall source discovery across announcements, exchanges, company/IR pages, customer/competitor materials, broker/industry reports, structured data, web search, and optional scripts/gemini_google_search.py when GEMINI_API_KEY is available; Gemini/Google output is leads only and must be verified against original sources. Keep market口径 as impact factors with evidence levels and validation paths; do not delete important broker/industry assumptions just because they are not announcement facts. Do not force evidence grading into a standalone final-report chapter when it is better embedded in core variables, profit bridge, tracking, or skeptic review. Do not write target price, target market cap, PE/PEG/SOTP, buy/sell rating, or formal valuation conclusions in final_report; prepare valuation_handoff for $growth-stock-valuation instead."

policy:
  allow_implicit_invocation: true
