interface:
  display_name: "成长股PEG估值"
  short_description: "用一致预期、动态PEG和复合PEG判断成长股定价，不产出DCF"
  default_prompt: "Use $growth-stock-valuation to value a growth stock with consensus expectations, dynamic PEG, forward PE, implied expectations, and valuation disconfirmation risks. Prefer the PEG-ready package and peg valuation handoff; use Tushare/AkShare/Wencai only as documented fallback sources for missing market, consensus, financial, or announcement fields. If consensus is unavailable but PEG-ready own profit anchors are complete, switch to no_consensus_mode and clearly label the output as a no-consensus scenario valuation rather than a formal consensus-driven PEG valuation. Read prior long research files only by targeted snippets for missing fields or conflicts. Mark the output as PEG-only unless a separate DCF model already exists."

policy:
  allow_implicit_invocation: true
