interface:
  display_name: "Agentic 底盘型成长股研究"
  short_description: "底盘型成长股深研：多角色研究、单一研报化终稿、三表/估值接力"
  default_prompt: "Use $chassis-growth-agentic-research for a formal A-share chassis growth stock report: follow its progressive references and private modules, run grouped role-separated research using the 5 research subagents + 2 QA subagents pattern or file-based substitutes, build facts_core/evidence_queue/evidence index/midterm QA/skeptic QA/final report gate/publication hygiene gate, preserve offensive market-repricing variables with evidence boundaries, pass prior files by Fact-ID, short summaries, or targeted snippets rather than full upstream dumps, write the single final_report itself in brokerage-style prose without visible Fact-ID/Lead-ID/internal process terms, use the chassis-growth spine from old-business floor to profit-slope drivers rather than a default supply-chain order narrative, prepare focused post-report valuation handoffs only after both gates pass, and do not put target price, target market cap, buy/sell rating, PE/PEG/SOTP conclusions, or formal valuation advice in final_report."

policy:
  allow_implicit_invocation: true
