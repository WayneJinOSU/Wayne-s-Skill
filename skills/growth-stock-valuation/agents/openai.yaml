interface:
  display_name: "成长股PEG估值"
  short_description: "用自有利润锚、共识对照、动态PEG和复合PEG判断成长股定价"
  default_prompt: "Use $growth-stock-valuation to value a growth stock with own normal/bull profit anchors, consensus expectations as market reference, dynamic PEG, forward PE, implied expectations, and valuation disconfirmation risks. Before formal PEG valuation, actively run $equity-catalyst-tracker as a catalyst precheck, or generate a catalyst_precheck file with catalyst log, stage scorecard, watchlist, red/yellow/green lights, and disconfirmation conditions if nested skill invocation is unavailable. Prefer the PEG-ready package and peg valuation handoff; use Tushare/AkShare/Wencai only as documented fallback sources for missing market, consensus, financial, or announcement fields. In consensus_mode, do not use consensus profit as the normal/bull target market-cap denominator by default: use own_normal_profit_* for normal valuation and own_bull_profit_* for bull valuation, and use consensus only for market-implied expectations, consensus gap, and optional consensus-implied reference tables. Do not let the auditor/disclosed-only view become the sole valuation conclusion: present Auditor View, PM View, and Catalyst View, and allow distant-year switching or PEG uplift only when catalyst triggers are explicit. Output only normal and bull valuation scenarios; do not produce conservative, bear, downside, or lower-bound valuation scenarios. If consensus is unavailable but PEG-ready own profit anchors are complete, switch to no_consensus_mode and clearly label the output as a no-consensus scenario valuation rather than a formal consensus-driven PEG valuation. Read prior long research files only by targeted snippets for missing fields or conflicts. Keep the output focused on PEG and dynamic PE."

policy:
  allow_implicit_invocation: true
