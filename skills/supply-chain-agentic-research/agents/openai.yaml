interface:
  display_name: "Agentic 供应链平台成长股研究"
  short_description: "用 6 个主攻 agent 和终审 QA 研究市场变量、技术路线、原材料、产能、订单验证和利润天花板"
  default_prompt: "Use $supply-chain-agentic-research for a formal A-share supply-chain platform growth stock report. Run six offensive research roles: market-variable spine, architecture/value ceiling, raw-material price chain, capacity upgrades/second curve, orders/business validation, and profit ceiling/profit bridge. Run skeptic review only as final QA before the final report. Embed industry cycle/capex into market variables and architecture, embed supply-chain position into architecture and orders/business validation, and embed execution signals into capacity and orders/business validation instead of treating them as equal standalone agents. Always write intermediate artifacts before the final investor-readable report. Keep formal valuation out of final_report; prepare dcf_financial_model_handoff for downstream $financial-modeling, peg_valuation_handoff for downstream $growth-stock-valuation, and let $financial-modeling produce PEG-ready and DCF-ready packages consumed by $growth-stock-valuation and dcf-model; the valuation aggregator consumes later model outputs."

policy:
  allow_implicit_invocation: true
